name: CI
on: [ push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc build-essential libc6-dev cppcheck
          cd tinycc && ./configure && make && sudo make install
          pip install prek

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install gcc coreutils
          cd tinycc && ./configure && make && sudo make install

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: MINGW64
          update: true
          install: |
            mingw-w64-x86_64-gcc
            make

      - name: Build and install TinyCC (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cd tinycc
          ./configure
          make
          make install

      - name: Build
        run: make

      - name: Diagnostics (macOS)
        if: runner.os == 'macOS'
        run: |
          set -x
          echo "=== Test 1: simple atomic store ==="
          cat > /tmp/test_warn2.c << 'TEOF'
          #include <stdatomic.h>
          int main() { int i = 1; char c = 2; int _Atomic *p = &i; atomic_store(&p, &c); }
          TEOF

          set +e
          ./rcc -O1 -c -o /tmp/test_rcc.o /tmp/test_warn2.c 2>&1 || true
          ./rcc -O1 -o /tmp/test_rcc_exe /tmp/test_warn2.c 2>&1 || true

          echo "=== rcc .o objdump ==="
          objdump -D /tmp/test_rcc.o 2>&1 || true

          echo "=== rcc .o macho layout ==="
          otool -l /tmp/test_rcc.o 2>&1 || true
          otool -rv /tmp/test_rcc.o 2>&1 || true

          echo "=== rcc binary objdump (full) ==="
          objdump -D /tmp/test_rcc_exe 2>&1 || true

          echo "=== rcc binary segment layout ==="
          otool -l /tmp/test_rcc_exe 2>&1 || true
          otool -lV /tmp/test_rcc_exe 2>&1 | grep -A20 "LC_SEGMENT_64\|sectname\|segname\|addr\|size\|offset\|filesize\|vmsize" | head -40 || true

          echo "=== rcc binary segment layout ==="
          otool -l /tmp/test_rcc_exe 2>&1 | grep -B2 -A15 "LC_SEGMENT_64\|__text\|filesize\|vmsize" | head -50 || true
          codesign -dvvv /tmp/test_rcc_exe 2>&1 || true

          echo "=== clang reference binary ==="
          cat > /tmp/test_nolib.c << 'TEOF'
          int main() { int i = 1; char c = 2; int *p = &i; *p = (int)&c; return 0; }
          TEOF
          clang -O1 -arch arm64 -o /tmp/test_clang_exe /tmp/test_nolib.c 2>&1 || true
          /tmp/test_clang_exe 2>&1; echo "clang exit=$?"
          otool -l /tmp/test_clang_exe 2>&1 | grep -B2 -A15 "LC_SEGMENT_64\|__text\|filesize\|vmsize" | head -50 || true
          objdump -D /tmp/test_clang_exe 2>&1 | grep -A30 "<_main>:" | head -35 || true

          echo "=== run rcc binary (capture signal) ==="
          /tmp/test_rcc_exe 2>&1; echo "exit=$?"

          echo "=== lldb backtrace (test_rcc_exe) ==="
          which lldb 2>&1 || true
          lldb -b -o "run" -o "bt" -o "quit" -- /tmp/test_rcc_exe 2>&1 || true

          echo "=== gdb backtrace (test_rcc_exe) ==="
          which gdb 2>&1 || true
          gdb -batch -ex "run" -ex "bt" -ex "quit" /tmp/test_rcc_exe 2>&1 || true

          echo "=== Test 2: 00_assignment ==="
          cat tinycc/tests/tests2/00_assignment.c
          ./rcc -O1 -o /tmp/test00_exe tinycc/tests/tests2/00_assignment.c 2>&1 || true
          /tmp/test00_exe 2>&1; echo "exit=$?"
          echo "=== lldb backtrace (test00_exe) ==="
          lldb -b -o "run" -o "bt" -o "quit" -- /tmp/test00_exe 2>&1 || true
          echo "=== darwin.o ==="
          ls -la lib/darwin.o 2>&1 || echo "NOT FOUND"

      - name: Run tests
        if: runner.os == 'macOS'
        run: |
          ./rcc --version
          ./rcc -print-search-dirs
          make check
          make test-torture || true

      - name: Cache pre-commit
        if: runner.os == 'macOS'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ matrix.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run linter
        if: runner.os == 'macOS'
        run: make lint
        timeout-minutes: 10

      - name: Check for source changes
        if: runner.os == 'macOS'
        id: changed
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            sources:
              - 'test/**'
              - 'src/**'
              - 'bench/**'
              - 'run_tcc_suite.ps1'

      - name: Run benchmarks
        if: runner.os == 'macOS' && steps.changed.outputs.sources == 'true'
        run: make bench

      - name: Upload Windows reports
        if: matrix.os == 'windows-latest' && steps.changed.outputs.sources == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-reports
          path: |
            bench/bench_report_mingw.md
            test/tcc_test_mingw.md
            test_report_mingw.md

      - name: Upload macOS reports
        if: matrix.os == 'macos-latest' && steps.changed.outputs.sources == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-reports
          path: |
            bench/bench_report_darwin.md
            test/tcc_test_arm64.md
            test/torture_report_arm64.log
            test_report_arm64.md

      - name: Upload Linux reports
        if: matrix.os == 'ubuntu-latest' && steps.changed.outputs.sources == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-reports
          path: |
            bench/bench_report_linux.md
            test/tcc_test_linux.md
            test/torture_report_linux.log
            test_report_linux.md

      - name: Make dist
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dist'
        run: make dist

      - name: Upload Windows dist
        if: matrix.os == 'windows-latest' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dist')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rcc-windows
          path: |
            rcc-*.zip

      - if: startsWith(github.ref, 'refs/tags/') && github.ref == 'refs/heads/main'
        name: Release
        continue-on-error: true
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
              rcc-*.tar.gz
              rcc-*.tar.xz
              rcc-*.zip
