name: CI
on: [push, pull_request]

concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc build-essential libc6-dev cppcheck
          cd tinycc && ./configure && make && sudo make install
          pip install prek

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install gcc coreutils
          cd tinycc && ./configure && make && sudo make install

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: MINGW64
          update: true
          install: |
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gdb
            make

      - name: Build and install TinyCC (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cd tinycc
          ./configure
          make
          make install

      - name: Build
        run: make

      - name: Smoke test (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          printf '#include <stdio.h>\nint main(){printf("ok\\n");return 0;}\n' > /tmp/smoke.c
          ./rcc -o /tmp/smoke /tmp/smoke.c
          /tmp/smoke
          printf '#include <stdlib.h>\nint main(){void *p=malloc(8);free(p);return p?0:1;}\n' > /tmp/smoke2.c
          ./rcc -o /tmp/smoke2 /tmp/smoke2.c
          /tmp/smoke2
          rm -f /tmp/smoke /tmp/smoke.c /tmp/smoke2 /tmp/smoke2.c

      - name: Smoke test (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          printf '#include <stdio.h>\nint main(){printf("ok\\n");return 0;}\n' > /tmp/smoke.c
          ./rcc -o /tmp/smoke /tmp/smoke.c
          /tmp/smoke
          printf '#include <stdlib.h>\nint main(){void *p=malloc(8);free(p);return p?0:1;}\n' > /tmp/smoke2.c
          ./rcc -o /tmp/smoke2 /tmp/smoke2.c
          /tmp/smoke2
          rm -f /tmp/smoke /tmp/smoke.c /tmp/smoke2 /tmp/smoke2.c

      - name: Run tests
        id: tests
        shell: bash
        run: |
          ./rcc --version
          FAIL=
          make check || FAIL=1
          make test-torture || FAIL=1
          test -z "$FAIL"

      - name: Check for source, bench or test changes
        id: changed
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            sources:
              - 'test/**'
              - 'src/**'
              - 'bench/**'
              - 'run_tests.c'

      - name: Run benchmarks
        if: steps.changed.outputs.sources == 'true'
        run: make bench

      - name: Upload Windows reports
        if: ${{ matrix.os == 'windows-latest' && steps.changed.outputs.sources == 'true' && (success() || failure()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-reports
          path: |
            bench/bench_report_mingw.md
            test/tcc_test_mingw.md
            test/torture_report_mingw.log
            test_report_mingw.md

      - name: Upload macOS reports
        if: ${{ matrix.os == 'macos-latest' && steps.changed.outputs.sources == 'true' && (success() || failure()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-reports
          path: |
            bench/bench_report_darwin.md
            test/tcc_test_arm64.md
            test/torture_report_arm64.log
            test_report_arm64.md

      - name: Upload Linux reports
        if: ${{ matrix.os == 'ubuntu-latest' && steps.changed.outputs.sources == 'true' && (success() || failure()) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-reports
          path: |
            bench/bench_report_linux.md
            test/tcc_test_linux.md
            test/torture_report_linux.log
            test_report_linux.md

      - name: Check test result
        if: steps.tests.outcome == 'failure'
        run: |
          echo "Tests failed — see uploaded artifacts for details"
          exit 1

      - name: Make dist
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dist'
        run: make dist

      - name: Upload Windows dist
        if: matrix.os == 'windows-latest' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dist')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rcc-windows
          path: |
            rcc-*.zip

      - if: startsWith(github.ref, 'refs/tags/') && github.ref == 'refs/heads/main'
        name: Release
        continue-on-error: true
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
              rcc-*.tar.gz
              rcc-*.tar.xz
              rcc-*.zip

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc build-essential libc6-dev cppcheck
          pip install prek

      - name: Build
        run: make

      - name: Run lint
        run: make lint
